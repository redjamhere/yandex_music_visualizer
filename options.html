<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Настройки визуализатора</title>
    <style>
        body { padding: 20px; font-family: sans-serif; background-color: #121212; color: white; }
        select, button { padding: 8px; margin: 5px 0; display: block; width: 100%; }
    </style>
</head>
<body>
    <label for="visStyle">Выберите стиль:</label>
    <select id="visStyle">
        <option value="anomaly">Anomaly (Классика)</option>
        <option value="terrain">Terrain</option>
        <option value="torus">Torus</option>
        <option value="anime">Anime</option>
        <option value="galaxy">Galaxy</option>
        <option value="equalizer">Equalizer</option>
        <option value="neon">Neon</option>
        <option value="neon">Liquid</option>
        <option value="cosmic">Cosmic</option>
        <option value="dna">Dna</option>
    </select>
    <button id="save">Сохранить</button>
    <script src="options.js"></script>
</body>
</html>
